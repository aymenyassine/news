<div class="container">
  <div style="display: flex; justify-content: space-between; align-items: center;">
    <h1>Blog de la Communauté</h1>
    <button *ngIf="authService.isLoggedIn()" class="btn btn-primary" routerLink="/create-post">Créer un post</button>
  </div>

  <div *ngIf="loading">Chargement...</div>

  <div class="posts-list">
    <div class="card" *ngFor="let post of posts">
      <h3>{{ post.title }}</h3>
      <p>{{ post.content.substring(0, 150) }}...</p>
      <div style="display: flex; justify-content: space-between; align-items: center;">
        <small>Par {{ post.author.name }} le {{ post.createdAt | date }}</small>
        <a [routerLink]="['/post', post.id]" class="btn btn-primary">Voir plus</a>
      </div>
    </div>
  </div>
</div>
